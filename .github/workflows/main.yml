name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'platformio.ini'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'platformio.ini'

permissions:
  contents: write

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          pip install --upgrade pip
          pip install platformio

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract version
        id: version
        run: |
          v=$(grep 'VERSION' src/Globals.cpp | sed -n 's/.*= *"\([^"]*\)".*/\1/p' | head -1 | tr -d ' ')
          echo "firmware_version=$v" >> "$GITHUB_OUTPUT"

      - name: Create version file
        run: echo '${{ steps.version.outputs.firmware_version }}' > version

      - name: Build ulanzi
        run: pio run --environment ulanzi

      - name: Build awtrix2_upgrade
        run: pio run --environment awtrix2_upgrade

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.firmware_version }}
          path: |
            .pio/build/ulanzi/firmware.bin
            .pio/build/awtrix2_upgrade/firmware.bin

      # Solo en push a main: actualizar flashers, crear release y commit
      - name: Copy firmware to flasher docs (ulanzi)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp .pio/build/ulanzi/firmware.bin docs/ulanzi_flasher/firmware/firmware.bin

      - name: Copy firmware to flasher docs (awtrix2_upgrade)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp .pio/build/awtrix2_upgrade/firmware.bin docs/awtrix2_flasher/firmware/firmware.bin

      - name: Update manifest ulanzi
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          jq '.version="${{ steps.version.outputs.firmware_version }}"' docs/ulanzi_flasher/firmware/manifest.json > docs/ulanzi_flasher/firmware/manifest.json.tmp
          mv docs/ulanzi_flasher/firmware/manifest.json.tmp docs/ulanzi_flasher/firmware/manifest.json

      - name: Update manifest awtrix2_upgrade
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          jq '.version="${{ steps.version.outputs.firmware_version }}"' docs/awtrix2_flasher/firmware/manifest.json > docs/awtrix2_flasher/firmware/manifest.json.tmp
          mv docs/awtrix2_flasher/firmware/manifest.json.tmp docs/awtrix2_flasher/firmware/manifest.json

      - name: Prepare release assets with distinct names
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p release_assets
          cp .pio/build/ulanzi/firmware.bin "release_assets/ulanzi_TC001_${{ steps.version.outputs.firmware_version }}.bin"
          cp .pio/build/awtrix2_upgrade/firmware.bin "release_assets/old_awtrix2_conversion_${{ steps.version.outputs.firmware_version }}.bin"

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.firmware_version }}
          name: Release ${{ steps.version.outputs.firmware_version }}
          files: |
            release_assets/ulanzi_TC001_${{ steps.version.outputs.firmware_version }}.bin
            release_assets/old_awtrix2_conversion_${{ steps.version.outputs.firmware_version }}.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit docs and manifest updates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update flasher firmware and manifests for ${{ steps.version.outputs.firmware_version }}"
          file_pattern: docs/*/firmware/* version
